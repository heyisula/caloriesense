<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calorie Prediction | Calorie Sense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="assistant-page">
  <div class="ambient-background">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="prediction-shell">
    <a class="back-link" href="/index.html">← Back to Home</a>
    
    <!-- LEFT COLUMN: Input Form -->
    <aside class="prediction-sidebar glass-panel spotlight-card">
      <div class="sidebar-header">
        <h2 style="margin-bottom: 4px; font-size: 1.4rem;">Calorie Sense</h2>
        <p style="color: var(--text-secondary); font-size: 0.9rem;">Prediction Module</p>
      </div>

      <div class="form-container">
        <p class="eyebrow mini" style="margin-top: 20px;"><span></span> Enter Exercise Data</p>
        
        <label class="field" style="margin-bottom: 12px; display: block;">
          <span>Gender</span>
          <select id="p-gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
          </select>
        </label>

        <label class="field" style="margin-bottom: 12px; display: block;">
          <span>Age</span>
          <input type="number" id="p-age" value="25" min="10" max="100">
        </label>

        <label class="field" style="margin-bottom: 12px; display: block;">
          <span>Heart Rate (BPM)</span>
          <input type="number" id="p-hr" value="120" min="40" max="220">
        </label>

        <label class="field" style="margin-bottom: 12px; display: block;">
          <span>Exercise Duration (Hours)</span>
          <input type="number" id="p-duration" value="1.0" step="0.1" min="0.1" max="10.0">
        </label>

        <label class="field" style="margin-bottom: 12px; display: block;">
          <div style="display: flex; justify-content: space-between;">
            <span>Exercise Intensity (1-10)</span>
            <span id="intensity-val" style="color: var(--accent-cyan); font-weight: bold; font-size: 1.1rem; margin-top: -4px;">5</span>
          </div>
          <input type="range" id="p-intensity" value="5" min="1" max="10" step="1" style="padding: 0; background: transparent; cursor: pointer; border: none;">
        </label>

        <button id="predict-btn" class="primary-button" style="margin-top: 12px; width: 100%;">Predict Calories Burned →</button>
        <p id="predict-error" class="error-text"></p>
      </div>
    </aside>

    <!-- RIGHT COLUMN: Dashboard & Results -->
    <section class="prediction-main glass-panel spotlight-card">
      
      <!-- Live Weather Card -->
      <div class="weather-card glass-panel" style="margin-bottom: 24px; background: rgba(255, 255, 255, 0.02); border-radius: var(--radius-xl); padding: 28px 36px;">
        <p class="eyebrow mini"><span></span> Live Location Weather</p>
        <div id="weather-content" style="display: flex; align-items: center; gap: 20px; margin-top: 10px;">
           <span style="font-size: 2.5rem;" id="weather-icon">⏳</span>
           <div>
             <h2 id="weather-city">Detecting Location...</h2>
             <p id="weather-desc" style="color: var(--text-secondary);">Fetching live data</p>
           </div>
           <div style="margin-left: auto; text-align: right;">
             <h1 id="weather-temp" style="color: var(--accent-cyan); font-size: 3rem;">--°C</h1>
           </div>
        </div>
      </div>

      <!-- Result Card -->
      <div class="result-card" style="height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
         <div id="result-placeholder">
            <span style="font-size: 4rem; opacity: 0.5;">🔥</span>
            <h2 style="margin-top: 16px; color: var(--text-secondary);">Awaiting Input</h2>
            <p style="color: var(--text-secondary); opacity: 0.7;">Fill out the form and predict to see calories burned.</p>
         </div>

         <div id="result-display" class="hidden">
            <p class="eyebrow"><span></span> Predicted Energy Expenditure</p>
            <!-- INTERACTIVE NUMBER -->
            <h1 id="calorie-value" style="font-size: clamp(5rem, 10vw, 8rem); font-family: 'JetBrains Mono', monospace; line-height: 1; margin: 20px 0; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; transition: all 0.5s ease; text-shadow: 0 0 20px rgba(6, 182, 212, 0.3);">0</h1>
            <h3 style="color: var(--text-secondary);">kcal burned</h3>
         </div>
      </div>

    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
